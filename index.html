<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Habits Chatbot UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-window">
            
            <div class="message ai">
                <div class="avatar">🤖</div>
                <div class="text">
                    Welcome! Want to learn the 30-Second Formula to a Billionaire Life? 🚀
                </div>
            </div>

            <div class="message user">
                <div class="text">Yes! How do I start with Micro Habits?</div>
                <div class="avatar">👤</div>
            </div>

            <div class="message ai">
                <div class="avatar">🤖</div>
                <div class="text">
                    Start by learning one new English word or helping one person today. Small steps lead to big success! 🌟
                </div>
            </div>

        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" placeholder="Type a message...">
                <button class="send-btn">⬆</button>
            </div>
        </div>
    </div>

</body>
</html>
